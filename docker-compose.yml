version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bookstore_db
    environment:
      SA_PASSWORD: "BookStore@123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - bookstore_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'BookStore@123!' -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookstore_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=BookStoreDb;User Id=sa;Password=BookStore@123!;TrustServerCertificate=True;
      - JwtSettings__SecretKey=BookStore_SuperSecretKey_ForJWT_2024_RitikChouhan_AtLeast32Chars!
      - JwtSettings__Issuer=BookStoreAPI
      - JwtSettings__Audience=BookStoreClients
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  bookstore_data:
